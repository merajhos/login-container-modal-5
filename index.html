<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <style>
  .font{
    font-family: "Geist", sans-serif;
  }

</style>
  <!-- daisyui + tailwindcss -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font-awesome cdn -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- google fonts -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class="bg-[#E4E4E7] font">


<!-- login-->

<div id="loginPage" class="flex items-center justify-center h-screen">

<div class="card w-96 bg-[#FFFFFF] shadow">

<div class="card-body items-center text-center">

<img src="./asets/github-logo.png" class="w-14">

<h2 class="card-title font-extrabold">GitHub Issues Tracker</h2>
<p class="text-sm text-[#64748B] font-semibold">Sign in to manage your issues</p>

<label for="username" class="text-left font-medium w-full">Username</label>
<input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full text-[#64748B] font-normal">
<p class="text-xs text-purple-500 text-left w-full">Default: admin</p>

<label for="password" class="text-left font-medium w-full">Password</label>
<input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full text-[#64748B] font-normal">
<p class="text-xs text-purple-500 text-left w-full">Default: admin123</p>

<button onclick="login()" class="btn btn-primary w-full">Sign In</button>

<p class="text-sm text-black font-bold">  OR  </p>

<p class="mb-2 text-sm text-[#64748B]">Demo Credentials:</p>

<div class="bg-gray-100 p-3 text-sm rounded w-full">

<p><span class="text-[15px] font-medium">Username: </span>admin</p> <br>
<p><span class="text-[15px] font-medium">Password: </span>admin123</p>
</div>

</div>
</div>
</div>


<!-- main -->

<div id="mainPage" class="hidden">


<!-- nav -->

<div class="navbar bg-white shadow px-10">

<div class="flex-1">
<h1 class="text-xl font-bold">
Github Issues Tracker
</h1>
</div>

<div class="flex gap-2">

<input id="searchInput"
type="text"
placeholder="Search Issues...."
class="input border-2 border-blue-600">

<button onclick="searchIssue()" class="btn btn-primary">
 + New Issue
</button>

</div>

</div>



<!-- tab -->

<div class="px-10 mt-6">


<div class="tabs tabs-boxed my-6 bg-[#FFFFFF] rounded-lg gap-2.5">

<button class="tab tab-active ml-2  shadow lg:shadow-gray-500 text-[#64748B] hover:text-[#FFFFFF] bg-[#ffffff] my-3 hover:bg-[#4A00FF] py-2 px-3 rounded-lg"
onclick="filterTab('all',this)">
All
</button>

<button class="tab border-[#E4E4E7]  shadow lg:shadow-gray-500  text-[#64748B] hover:text-[#FFFFFF] bg-[#ffffff] my-3 hover:bg-[#4A00FF] py-2 px-3 rounded-lg"
onclick="filterTab('open',this)">
Open
</button>

<button class="tab border-[#E4E4E7]  shadow lg:shadow-gray-500  text-[#64748B] hover:text-[#FFFFFF] bg-[#ffffff] my-3 hover:bg-[#4A00FF] py-2 px-3 rounded-lg"
onclick="filterTab('closed',this)">
Closed
</button>

</div>



<!-- header  -->

<div class="flex justify-between items-center bg-[#FFFFFF] mt-6 rounded-tr-lg rounded-tl-lg">

<div class="flex items-center ml-3 gap-3 my-3">

<div class="bg-purple-100 p-2 rounded-full">
<img src="asets/Group 1.png"  alt="">
</div>

<div>

<h2 id="issueCount" class="text-lg font-semibold">
0 Issues
</h2>

<p class="text-[#64748B] text-sm">
Track and manage your project issues
</p>

</div>

</div>


<div class="flex items-center gap-4 text-sm">

<div class="flex items-center gap-1 font-medium text-[16px]">
<div class="w-3 h-3 bg-green-500 rounded-full"></div>
Open
</div>

<div class="flex items-center gap-1 mr-4 font-medium text-[16px]">
<div class="w-3 h-3 bg-purple-500 rounded-full "></div>
Closed
</div>

</div>

</div>



<div id="loading" class="text-center hidden">

<span class="loading loading-spinner loading-lg"></span>

</div>



<!-- Grid isu -->

<div id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
</div>

</div>

</div>



<!-- modal -->

<dialog id="issueModal" class="modal">

<div class="modal-box">

<h3 id="modalTitle" class="font-bold text-lg"></h3>

<p id="modalDesc" class="py-2 text-gray-600"></p>

<div id="modalInfo" class="text-sm"></div>

<div class="modal-action">

<form method="dialog">
<button class="btn btn-primary">Close</button>
</form>

</div>

</div>

</dialog>


 <script src="./srcipt.js"></script>

</body>

</html>
